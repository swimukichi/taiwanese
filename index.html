<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Culture Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Taiwan Culture Hub</h1>
            <p class="hero-subtitle">台湾の文化・言語・魅力を深掘りするブログ</p>
            <p class="hero-description">
                台湾での生活経験を通じて、言語、文化、そして人間関係の微妙なニュアンスについてシェアしています。
                台湾人妻との日常から学んだリアルな情報をお届けします。
            </p>
        </div>
    </section>

    <!-- Articles Section -->
    <section class="articles-section">
        <h2>Featured Articles</h2>
        <div id="featured-articles" class="articles-grid"></div>
    </section>

    <script src="data/articles.js"></script>
    <script>
        const container = document.getElementById('featured-articles');
        articles.forEach(article => {
            container.innerHTML += `
                <article class="card">
                    <div class="card-content">
                        <h3>${article.title}</h3>
                        <p class="card-description">${article.description}</p>
                        <div class="card-meta">
                            <span class="category">${article.category}</span>
                            <a href="${article.source}" target="_blank" class="read-link">noteで読む →</a>
                        </div>
                    </div>
                </article>
            `;
        });
    </script>
</body>
</html>
